  <!-- Mouth -->
  <path d="M12 16.5 Q10.5 18 10 17.5" stroke="#1a1a2e" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  <path d="M12 16.5 Q13.5 18 14 17.5" stroke="#1a1a2e" stroke-width="0.5" fill="none" stroke-linecap="round"/>
